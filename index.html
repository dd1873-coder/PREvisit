<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body { font-family: Arial; background:#eee; }

.form-sheet {
    width: 900px;
    max-width:95%;
    background:#fff;
    margin:auto;
    padding:20px;
    border:1px solid #000;
}

h2,h3 { text-align:center; }

table {
    width:100%;
    border-collapse: collapse;
    font-size:12px;
}

th, td {
    border:1px solid #000;
    padding:5px;
}

input {
    width:100%;
    border:none;
    outline:none;
}

/* SIGNATURE PREVIEW */
.signature-box{
    border:1px solid #000;
    height:120px;
    width:100%;
    object-fit:contain;
    cursor:pointer;
}

/* MODAL */
#signModal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal-box{
    background:#fff;
    padding:15px;
    width:90%;
    max-width:400px;
    border-radius:10px;
    text-align:center;
}

button{
    margin:8px;
    padding:8px 15px;
}
</style>
</head>

<body>

<div id="report" class="form-sheet">

<h2>Micromatic Machine Tools Pvt Ltd</h2>
<h3>TPM PRE-VISIT REPORT-ACE</h3>

<table>
<tr><td>Customer Name</td><td><input id="cust"></td>
<td>Machine Model</td><td><input id="model"></td></tr>

<tr><td>Contact Person</td><td><input id="person"></td>
<td>Machine SL.NO</td><td><input id="sl"></td></tr>

<tr><td>Department</td><td><input id="dept"></td>
<td>Contact No</td><td><input id="contact"></td></tr>

<tr><td>Date</td><td><input type="date" id="date"></td>
<td>Attended By</td><td><input id="tech"></td></tr>
</table>

<br>

<table id="checkTable">
<tr>
<th>S.No</th><th>Check Point</th><th>OK</th><th>Not OK</th><th>Remarks</th>
</tr>
</table>

<br>

<h3>Scope of Work / Spares</h3>
<table id="scopeTable">
<tr>
<th>S.No</th><th>MMT Scope</th><th>Customer Scope</th>
</tr>
</table>

<button onclick="addScopeRow()">+ Add Scope</button>

<br><br>

<h4>MMT Signature</h4>
<img id="techPreview" class="signature-box" onclick="openSign('tech')">

<h4>Customer Signature</h4>
<img id="custPreview" class="signature-box" onclick="openSign('cust')">

</div>

<div style="text-align:center;">
<button onclick="downloadPDF()">Download PDF</button>
</div>

<!-- SIGNATURE MODAL -->
<div id="signModal">
<div class="modal-box">
<h3>Draw Signature</h3>
<canvas id="signPad" style="border:1px solid #000;width:100%;height:200px;"></canvas>
<br>
<button onclick="clearPad()">Clear</button>
<button onclick="savePad()">Save</button>
<button onclick="closePad()">Cancel</button>
</div>
</div>

<script>

// ---------- CHECKLIST ----------
const points = [
"Machine in Running Condition","Oil Leakage in Hydraulic Tank","Oil Leakage in Hydraulic Circuit, Hose Condition, etc.,","Noise in Hydraulic System",
"Functioning of Hydraulic System","Oil Leakage in Lubrication Tank","Oil Leakage in Lubrication Circuit, Hose Condition, etc.,","Functioning of Lubrication pressure gauge","Coolant Leakage, if any",
"Availability of Y-Strainer & it’s Condition","Chucking Cylinder oil Leakage","Functioning of Gauge Isolator","Functioning of Accumulator","Tailstock Working Condition",
"Spindle Encoder Condition","Noise in Spindle","Operator Control Panel Condition, beading, etc.,","Turret condition Coolant, insight glass, Noise, etc.,",
"Turret Cable Condition","Availability of Ac Relay in Turret Circuit","Foot Switch Condition","Machine door condition",
"A/C Condition-Functioning, Grill, Mesh, etc.,","Electrical Panel Condition","Cooling fans Condition - Spindle/Heat Sink, system, etc.,","Spindle, Axis cables Condition","Machine Incoming Supply, E-N Voltage, etc.,",
"Axis Wiper Condition","Axis Condition - Noise","Ball Screw Condition","Size Variation, Slide Play, Backlash, if any","Belt Condition - Axis, Spindle, Encoder, etc.,",
"Machine lamp condition","Condition of System Screen","Battery Condition - System & Drive"
];

points.forEach((p,i)=>{
checkTable.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${p}</td>
<td><input type="radio" name="r${i}" value="OK" onchange="saveData()"></td>
<td><input type="radio" name="r${i}" value="NOTOK" onchange="saveData()"></td>
<td><input id="remark${i}" oninput="saveData()"></td>
</tr>`;
});

// ---------- SCOPE ----------
let scopeCount=0;

function addScopeRow(data={}){
scopeCount++;
scopeTable.innerHTML+=`
<tr>
<td>${scopeCount}</td>
<td><input value="${data.mmt||''}" oninput="saveData()"></td>
<td><input value="${data.customer||''}" oninput="saveData()"></td>
</tr>`;
}

// ---------- SIGNATURE ----------
let currentSign="";
const canvas=document.getElementById("signPad");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
let ratio=window.devicePixelRatio||1;
canvas.width=canvas.offsetWidth*ratio;
canvas.height=canvas.offsetHeight*ratio;
ctx.scale(ratio,ratio);
}
resizeCanvas();

let drawing=false;

function getPos(e){
let r=canvas.getBoundingClientRect();
return{
x:(e.touches?e.touches[0].clientX:e.clientX)-r.left,
y:(e.touches?e.touches[0].clientY:e.clientY)-r.top
};
}

function draw(e){
if(!drawing)return;
let p=getPos(e);
ctx.lineTo(p.x,p.y);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(p.x,p.y);
}

canvas.onmousedown=()=>drawing=true;
canvas.onmouseup=()=>drawing=false;
canvas.onmousemove=draw;

canvas.ontouchstart=()=>drawing=true;
canvas.ontouchend=()=>drawing=false;
canvas.ontouchmove=draw;

function openSign(type){
currentSign=type;
signModal.style.display="flex";
ctx.clearRect(0,0,canvas.width,canvas.height);
}

function closePad(){signModal.style.display="none";}
function clearPad(){ctx.clearRect(0,0,canvas.width,canvas.height);}

function savePad(){
let data=canvas.toDataURL();
if(currentSign==="tech"){
techPreview.src=data;
localStorage.setItem("techSign",data);
}else{
custPreview.src=data;
localStorage.setItem("custSign",data);
}
closePad();
}

function loadSignature(){
let t=localStorage.getItem("techSign");
let c=localStorage.getItem("custSign");
if(t) techPreview.src=t;
if(c) custPreview.src=c;
}

// ---------- SAVE ----------
function saveData(){
let d={
cust:cust.value,model:model.value,person:person.value,
sl:sl.value,dept:dept.value,contact:contact.value,
date:date.value,tech:tech.value,
checklist:[],scope:[]
};

points.forEach((p,i)=>{
let s=document.querySelector(`input[name="r${i}"]:checked`);
d.checklist.push({status:s?s.value:"",remark:document.getElementById(`remark${i}`).value});
});

document.querySelectorAll("#scopeTable tr").forEach((r,i)=>{
if(i===0)return;
let inp=r.querySelectorAll("input");
d.scope.push({mmt:inp[0].value,customer:inp[1].value});
});

localStorage.setItem("reportData",JSON.stringify(d));
}

// ---------- LOAD ----------
function loadData(){
let d=JSON.parse(localStorage.getItem("reportData"));

scopeTable.innerHTML=`<tr><th>S.No</th><th>MMT Scope</th><th>Customer Scope</th></tr>`;
scopeCount=0;

if(!d){
for(let i=0;i<3;i++) addScopeRow();
return;
}

cust.value=d.cust||"";
model.value=d.model||"";
person.value=d.person||"";
sl.value=d.sl||"";
dept.value=d.dept||"";
contact.value=d.contact||"";
date.value=d.date||"";
tech.value=d.tech||"";

d.checklist?.forEach((it,i)=>{
if(it.status){
let r=document.querySelector(`input[name="r${i}"][value="${it.status}"]`);
if(r) r.checked=true;
}
document.getElementById(`remark${i}`).value=it.remark||"";
});

if(d.scope?.length) d.scope.forEach(x=>addScopeRow(x));
else for(let i=0;i<3;i++) addScopeRow();
}

// ---------- PDF ----------
function downloadPDF(){
html2canvas(report).then(c=>{
let pdf=new jspdf.jsPDF();
pdf.addImage(c.toDataURL(),"PNG",0,0,210,295);
pdf.save("TPM_Report.pdf");

if(confirm("Clear form after download?")){
localStorage.clear();
location.reload();
}
});
}

// ---------- INIT ----------
loadData();
loadSignature();

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",saveData);
});

</script>

</body>
</html>
